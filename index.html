<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Sito Fazione</title>
  <style>
    body { font-family: Arial; margin: 0; background: #0b1a2b; color: #e6f0ff; }
    header { background: #0f2f55; padding: 15px; text-align: center; }
    nav { display: flex; justify-content: center; gap: 20px; margin: 20px; }
    button { padding: 10px 20px; cursor: pointer; background: #1e5aa8; color: white; border: none; border-radius: 5px; }
    button:hover { background: #2f73c9; }
    .section { display: none; padding: 20px; }
    .active { display: block; }
    .box { background: #123a6b; padding: 30px; text-align: center; cursor: pointer; margin: 20px auto; width: 220px; border-radius: 10px; }
    form { margin-top: 20px; max-width: 300px; }
    input, textarea { display: block; margin: 10px 0; padding: 8px; width: 100%; border-radius: 5px; border: none; }
    textarea { resize: vertical; }
    .records { margin-top: 20px; }
    .record { background: #0f2f55; padding: 10px; margin: 5px 0; border-radius: 5px; }

    /* STILE ON/OFF */
    .onoff-buttons { display: flex; gap: 20px; margin-top: 10px; }
    .onoff-btn { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
    .onoff-btn:hover { transform: scale(1.05); }
    .on { background-color: #4CAF50; color: #fff; }
    .off { background-color: #f44336; color: #fff; }
  </style>
</head>
<body>

<header>
  <h1>Sito Fazione</h1>
</header>

<nav>
  <button onclick="showSection('assenze')">Assenze</button>
  <button onclick="showSection('posate')">Posate Pistola</button>
  <button onclick="showSection('onoff')">ON/OFF</button>
  <button onclick="showSection('obiettivo')">Obiettivo Giornaliero</button>
</nav>

<!-- ASSENZE -->
<div id="assenze" class="section active">
  <h2>Modulo Assenze</h2>
  <form id="formAssenze">
    <input type="text" id="nomeAssenza" placeholder="Nome">
    <input type="date" id="dataAssenza">
    <input type="text" id="motivoAssenza" placeholder="Motivo">
    <button type="button" onclick="salvaAssenza()">Salva Assenza</button>
  </form>
  <div class="records" id="recordsAssenze"></div>
</div>

<!-- POSATE -->
<div id="posate" class="section">
  <h2>Categoria Posate Pistola</h2>
  <div class="box" onclick="apriForm()">CREA MODULO</div>
  <form id="form" style="display:none;">
    <h3>Compila Modulo</h3>
    <input type="text" id="nome" placeholder="Nome">
    <input type="date" id="data">
    <input type="time" id="ora">
    <button type="button" onclick="salva()">Salva</button>
  </form>
  <div class="records" id="records"></div>
</div>

<!-- ON/OFF -->
<div id="onoff" class="section">
  <h2>ON/OFF</h2>
  <form id="formOnOff">
    <input type="text" id="nomeOnOff" placeholder="Nome">
    <div class="onoff-buttons">
      <button type="button" class="onoff-btn on" onclick="salvaOnOff('ON')">ON</button>
      <button type="button" class="onoff-btn off" onclick="salvaOnOff('OFF')">OFF</button>
    </div>
  </form>
  <div class="records" id="recordsOnOff"></div>
</div>

<!-- OBIETTIVO GIORNALIERO -->
<div id="obiettivo" class="section">
  <h2>Obiettivo Giornaliero</h2>
  <form id="formObiettivo">
    <input type="text" id="nomeObiettivo" placeholder="Nome">
    <input type="date" id="dataObiettivo">
    <input type="time" id="oraObiettivo">
    <textarea id="descrizioneObiettivo" placeholder="Descrivi l'obiettivo da fare" rows="3"></textarea>
    <button type="button" onclick="salvaObiettivo()">Salva Obiettivo</button>
  </form>
  <div class="records" id="recordsObiettivo"></div>
</div>

<script>
  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // POSATE
  function apriForm() { document.getElementById('form').style.display = 'block'; }
  function salva() {
    const nome = document.getElementById('nome').value;
    const data = document.getElementById('data').value;
    const ora = document.getElementById('ora').value;
    if(!nome || !data || !ora){ alert('Compila tutti i campi'); return; }
    let record = document.createElement('div');
    record.className = 'record';
    record.innerText = `${nome} - ${data} ${ora}`;
    document.getElementById('records').appendChild(record);
    document.getElementById('form').reset();
    document.getElementById('form').style.display = 'none';
  }

  // ASSENZE
  function salvaAssenza() {
    const nome = document.getElementById('nomeAssenza').value;
    const data = document.getElementById('dataAssenza').value;
    const motivo = document.getElementById('motivoAssenza').value;
    if(!nome || !data || !motivo){ alert('Compila tutti i campi'); return; }
    let record = document.createElement('div');
    record.className = 'record';
    record.innerText = `${nome} - ${data} - Motivo: ${motivo}`;
    document.getElementById('recordsAssenze').appendChild(record);
    document.getElementById('formAssenze').reset();
  }

  // ON/OFF
  function salvaOnOff(stato) {
    const nome = document.getElementById('nomeOnOff').value;
    if(!nome){ alert('Inserisci il nome'); return; }
    let record = document.createElement('div');
    record.className = 'record';
    record.innerText = `${nome} è ${stato}`;
    document.getElementById('recordsOnOff').appendChild(record);
    document.getElementById('formOnOff').reset();
  }

  // OBIETTIVO GIORNALIERO
  function salvaObiettivo() {
    const nome = document.getElementById('nomeObiettivo').value;
    const data = document.getElementById('dataObiettivo').value;
    const ora = document.getElementById('oraObiettivo').value;
    const descrizione = document.getElementById('descrizioneObiettivo').value;
    if(!nome || !data || !ora || !descrizione){ alert('Compila tutti i campi'); return; }
    let record = document.createElement('div');
    record.className = 'record';
    record.innerText = `${nome} - ${data} ${ora} : ${descrizione}`;
    document.getElementById('recordsObiettivo').appendChild(record);
    document.getElementById('formObiettivo').reset();
  }
</script>

</body>
</html>
